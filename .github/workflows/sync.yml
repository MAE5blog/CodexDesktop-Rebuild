name: Sync OpenAI App & Release MAE5 Targets

on:
  schedule:
    - cron: "0 8 * * *"
  workflow_dispatch:
    inputs:
      force:
        description: "Force a build even without a detected version change"
        type: boolean
        default: false

env:
  NODE_VERSION: "24"

permissions:
  contents: read

concurrency:
  group: mae5-production-release
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    outputs:
      has_update: ${{ steps.detect.outputs.has_update }}
      version: ${{ steps.detect.outputs.version }}
      win_version: ${{ steps.detect.outputs.win_version }}
      linux_source_version: ${{ steps.detect.outputs.linux_source_version }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      - name: Check upstream app versions
        id: detect
        shell: bash
        run: |
          set +e
          RESULT=$(node scripts/check-update.js --json 2>&1)
          exit_code=$?
          set -e

          printf '%s\n' "$RESULT"
          if [ "$exit_code" -gt 1 ]; then
            echo "Version detection failed with exit code $exit_code"
            exit "$exit_code"
          fi

          WIN_VER=$(printf '%s' "$RESULT" | node -e "let d='';process.stdin.on('data',c=>d+=c);process.stdin.on('end',()=>{try{const j=JSON.parse(d);console.log(j.platforms?.Windows?.version||'')}catch{console.log('')}})")
          MAC_ARM64=$(printf '%s' "$RESULT" | node -e "let d='';process.stdin.on('data',c=>d+=c);process.stdin.on('end',()=>{try{const j=JSON.parse(d);console.log(j.platforms?.['macOS-arm64']?.version||'')}catch{console.log('')}})")
          VERSION="${MAC_ARM64:-$WIN_VER}"

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "win_version=$WIN_VER" >> "$GITHUB_OUTPUT"
          echo "linux_source_version=$MAC_ARM64" >> "$GITHUB_OUTPUT"

          if [ "${{ inputs.force }}" = "true" ] || [ "$exit_code" -eq 0 ]; then
            if [ -z "$VERSION" ]; then
              echo "Build requested but no release version was detected"
              exit 2
            fi
            echo "has_update=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_update=false" >> "$GITHUB_OUTPUT"
            echo "No upstream update detected."
          fi

  build-windows-x64:
    needs: check
    if: needs.check.outputs.has_update == 'true'
    runs-on: windows-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      - run: choco install 7zip -y
      - name: Add 7zz alias
        shell: pwsh
        run: |
          Copy-Item "C:\Program Files\7-Zip\7z.exe" "C:\Program Files\7-Zip\7zz.exe" -Force
          "C:\Program Files\7-Zip" | Out-File -Append -Encoding utf8 $env:GITHUB_PATH
      - name: Sync Windows upstream package
        run: node scripts/sync-upstream.js --force --skip-mac
      - name: Apply Windows patches
        run: node scripts/patch-all.js win
      - name: Build Windows x64
        run: npm run build:win-x64
      - uses: actions/upload-artifact@v7
        with:
          name: Codex-MAE5-Windows-x64
          path: out/*.zip
          if-no-files-found: error
          retention-days: 7

  build-linux-arm64:
    needs: check
    if: needs.check.outputs.has_update == 'true'
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y rpm fakeroot dpkg 7zip
          if ! command -v 7zz >/dev/null 2>&1 && command -v 7z >/dev/null 2>&1; then
            sudo ln -sf "$(command -v 7z)" /usr/local/bin/7zz
          fi
      - run: npm ci
      - name: Sync macOS ARM64 upstream package for Linux
        run: node scripts/sync-upstream.js --force --skip-win
      - name: Apply ARM64 source patches
        run: node scripts/patch-all.js mac-arm64
      - name: Build Linux ARM64 natively
        run: npm run build:linux-arm64
      - uses: actions/upload-artifact@v7
        with:
          name: Codex-MAE5-Linux-arm64
          path: |
            out/make/deb/**/*.deb
            out/make/rpm/**/*.rpm
            out/make/zip/**/*.zip
          if-no-files-found: error
          retention-days: 7

  release:
    needs: [check, build-windows-x64, build-linux-arm64]
    if: >-
      always() &&
      needs.check.result == 'success' &&
      needs.build-windows-x64.result == 'success' &&
      needs.build-linux-arm64.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          token: ${{ secrets.PAT_TOKEN || secrets.GITHUB_TOKEN }}
          fetch-depth: 0
          fetch-tags: true
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
      - run: npm ci
      - name: Resolve production release tag
        id: release_tag
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ needs.check.outputs.version }}
        shell: bash
        run: |
          set -euo pipefail
          BASE_TAG="mae5-v${VERSION}"
          REVISION=1

          while true; do
            if [ "$REVISION" -eq 1 ]; then
              TAG="$BASE_TAG"
              RELEASE_NAME="Codex MAE5 ${VERSION}"
            else
              TAG="${BASE_TAG}-r${REVISION}"
              RELEASE_NAME="Codex MAE5 ${VERSION} (revision ${REVISION})"
            fi

            RELEASE_JSON=$(gh api "repos/${GITHUB_REPOSITORY}/releases/tags/${TAG}" 2>/dev/null || true)
            if [ -n "$RELEASE_JSON" ]; then
              IS_DRAFT=$(printf '%s' "$RELEASE_JSON" | node -e "let d='';process.stdin.on('data',c=>d+=c);process.stdin.on('end',()=>console.log(JSON.parse(d).draft?'true':'false'))")
              if [ "$IS_DRAFT" = "true" ]; then
                REUSE_TAG=true
                break
              fi
              REVISION=$((REVISION + 1))
              continue
            fi

            if git rev-parse "refs/tags/${TAG}" >/dev/null 2>&1; then
              REUSE_TAG=true
            else
              REUSE_TAG=false
            fi
            break
          done

          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "release_name=$RELEASE_NAME" >> "$GITHUB_OUTPUT"
          echo "reuse_tag=$REUSE_TAG" >> "$GITHUB_OUTPUT"

      - name: Update version metadata and tag release commit
        id: metadata
        env:
          VERSION: ${{ needs.check.outputs.version }}
          TAG: ${{ steps.release_tag.outputs.tag }}
          REUSE_TAG: ${{ steps.release_tag.outputs.reuse_tag }}
        shell: bash
        run: |
          set -euo pipefail

          npm version "$VERSION" --no-git-tag-version --allow-same-version
          node scripts/check-update.js --save --quiet --force

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json package-lock.json scripts/.versions.json
          if ! git diff --cached --quiet; then
            git commit -m "Bump version to ${VERSION}"
            git push origin HEAD
          fi

          if [ "$REUSE_TAG" = "true" ]; then
            git tag -fa "$TAG" -m "Codex MAE5 ${VERSION}"
            git push --force origin "refs/tags/${TAG}"
          else
            git tag -a "$TAG" -m "Codex MAE5 ${VERSION}"
            git push origin "refs/tags/${TAG}"
          fi

          echo "commit=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"
      - uses: actions/download-artifact@v7
        with:
          path: artifacts
      - name: Prepare release assets and checksums
        env:
          VERSION: ${{ needs.check.outputs.version }}
          TAG: ${{ steps.release_tag.outputs.tag }}
          RELEASE_COMMIT: ${{ steps.metadata.outputs.commit }}
          WIN_VERSION: ${{ needs.check.outputs.win_version }}
          LINUX_VERSION: ${{ needs.check.outputs.linux_source_version }}
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release-assets
          count=0
          while IFS= read -r -d '' file; do
            name=$(basename "$file")
            if [ -e "release-assets/$name" ]; then
              echo "Duplicate release asset name: $name"
              exit 1
            fi
            cp "$file" "release-assets/$name"
            count=$((count + 1))
          done < <(find artifacts -type f \( -name '*.zip' -o -name '*.deb' -o -name '*.rpm' -o -name '*.exe' \) -print0)

          if [ "$count" -eq 0 ]; then
            echo "No release assets were downloaded"
            exit 1
          fi

          node scripts/create-release-manifest.js \
            --assets release-assets \
            --output release-assets/release-manifest.json \
            --version "$VERSION" \
            --tag "$TAG" \
            --commit "$RELEASE_COMMIT" \
            --run-url "${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}" \
            --windows-version "$WIN_VERSION" \
            --linux-version "$LINUX_VERSION"

          (
            cd release-assets
            find . -maxdepth 1 -type f ! -name SHA256SUMS.txt -printf '%P\0' \
              | sort -z \
              | xargs -0 sha256sum > SHA256SUMS.txt
          )
          ls -lh release-assets

      - name: Publish production release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.release_tag.outputs.tag }}
          name: ${{ steps.release_tag.outputs.release_name }}
          body: |
            Production release of the MAE5-focused Codex Desktop Rebuild distribution.

            | Target | Upstream source version |
            |--------|-------------------------|
            | Windows x64 | `${{ needs.check.outputs.win_version || 'N/A' }}` |
            | Linux ARM64 | `${{ needs.check.outputs.linux_source_version || 'N/A' }}` |

            Build commit: `${{ steps.metadata.outputs.commit }}`

            Verify downloaded files with `SHA256SUMS.txt`. Machine-readable provenance is included in `release-manifest.json`.
          files: |
            release-assets/*
          draft: false
          prerelease: false
          make_latest: true
          overwrite_files: true
          fail_on_unmatched_files: true
          preserve_order: true
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify formal release and remove stale drafts
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.release_tag.outputs.tag }}
        shell: bash
        run: |
          set -euo pipefail
          RELEASE=$(gh api "repos/${GITHUB_REPOSITORY}/releases/tags/${TAG}")
          printf '%s' "$RELEASE" | node -e "let d='';process.stdin.on('data',c=>d+=c);process.stdin.on('end',()=>{const r=JSON.parse(d);if(r.draft||r.prerelease)process.exit(1);console.log(r.html_url)})"

          gh api --paginate "repos/${GITHUB_REPOSITORY}/releases?per_page=100" \
            --jq '.[] | select(.draft and (.tag_name | startswith("mae5-v"))) | [.id,.tag_name] | @tsv' \
            | while IFS=$'\t' read -r release_id stale_tag; do
                [ -n "$release_id" ] || continue
                echo "Deleting stale draft release $stale_tag"
                gh api --method DELETE "repos/${GITHUB_REPOSITORY}/releases/${release_id}"
              done
