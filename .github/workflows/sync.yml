name: Sync OpenAI App & Release MAE5 Targets

on:
  schedule:
    - cron: "0 8 * * *"
  workflow_dispatch:
    inputs:
      force:
        description: "Force a build even without a detected version change"
        type: boolean
        default: false

env:
  NODE_VERSION: "24"

jobs:
  check:
    runs-on: ubuntu-latest
    outputs:
      has_update: ${{ steps.detect.outputs.has_update }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      - name: Check upstream app versions
        id: detect
        shell: bash
        run: |
          set +e
          node scripts/check-update.js --json 2>&1
          exit_code=$?
          set -e

          if [ "${{ inputs.force }}" = "true" ] || [ "$exit_code" -eq 0 ]; then
            echo "has_update=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_update=false" >> "$GITHUB_OUTPUT"
            echo "No upstream update detected."
          fi

  build-windows-x64:
    needs: check
    if: needs.check.outputs.has_update == 'true'
    runs-on: windows-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      - run: choco install 7zip -y
      - name: Add 7zz alias
        shell: pwsh
        run: |
          Copy-Item "C:\Program Files\7-Zip\7z.exe" "C:\Program Files\7-Zip\7zz.exe" -Force
          "C:\Program Files\7-Zip" | Out-File -Append -Encoding utf8 $env:GITHUB_PATH
      - name: Sync Windows upstream package
        run: node scripts/sync-upstream.js --force --skip-mac
      - name: Apply Windows patches
        run: node scripts/patch-all.js win
      - name: Build Windows x64
        run: npm run build:win-x64
      - uses: actions/upload-artifact@v7
        with:
          name: Codex-MAE5-Windows-x64
          path: out/*.zip
          if-no-files-found: error

  build-linux-arm64:
    needs: check
    if: needs.check.outputs.has_update == 'true'
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y rpm fakeroot dpkg 7zip
          if ! command -v 7zz >/dev/null 2>&1 && command -v 7z >/dev/null 2>&1; then
            sudo ln -sf "$(command -v 7z)" /usr/local/bin/7zz
          fi
      - run: npm ci
      - name: Sync macOS ARM64 upstream package for Linux
        run: node scripts/sync-upstream.js --force --skip-win
      - name: Apply ARM64 source patches
        run: node scripts/patch-all.js mac-arm64
      - name: Build Linux ARM64 natively
        run: npm run build:linux-arm64
      - uses: actions/upload-artifact@v7
        with:
          name: Codex-MAE5-Linux-arm64
          path: |
            out/make/deb/**/*.deb
            out/make/rpm/**/*.rpm
            out/make/zip/**/*.zip
          if-no-files-found: error

  release:
    needs: [check, build-windows-x64, build-linux-arm64]
    if: >-
      always() &&
      needs.check.result == 'success' &&
      needs.build-windows-x64.result == 'success' &&
      needs.build-linux-arm64.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          token: ${{ secrets.PAT_TOKEN || secrets.GITHUB_TOKEN }}
          fetch-depth: 0
          fetch-tags: true
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
      - run: npm ci
      - name: Resolve version and create MAE5 tag
        id: version
        shell: bash
        run: |
          RESULT=$(node scripts/check-update.js --json --force)
          WIN_VER=$(echo "$RESULT" | node -e "let d='';process.stdin.on('data',c=>d+=c);process.stdin.on('end',()=>{try{const j=JSON.parse(d);console.log(j.platforms?.Windows?.version||'')}catch{console.log('')}})")
          MAC_ARM64=$(echo "$RESULT" | node -e "let d='';process.stdin.on('data',c=>d+=c);process.stdin.on('end',()=>{try{const j=JSON.parse(d);console.log(j.platforms?.['macOS-arm64']?.version||'')}catch{console.log('')}})")
          VERSION="${MAC_ARM64:-$WIN_VER}"

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "win_version=$WIN_VER" >> "$GITHUB_OUTPUT"
          echo "linux_source_version=$MAC_ARM64" >> "$GITHUB_OUTPUT"
          if [ -z "$VERSION" ]; then
            echo "No version detected"
            exit 0
          fi

          npm version "$VERSION" --no-git-tag-version --allow-same-version
          node scripts/check-update.js --save --quiet --force

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json package-lock.json scripts/.versions.json
          if ! git diff --cached --quiet; then
            git commit -m "Bump version to ${VERSION}"
            git push origin HEAD
          fi

          TAG="mae5-v${VERSION}"
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG already exists"
          else
            git tag -a "$TAG" -m "Codex MAE5 ${VERSION}"
            git push origin "$TAG"
          fi
      - uses: actions/download-artifact@v7
        with:
          path: artifacts
      - name: Create draft release
        if: steps.version.outputs.version != ''
        uses: softprops/action-gh-release@v3
        with:
          tag_name: mae5-v${{ steps.version.outputs.version }}
          name: Codex MAE5 ${{ steps.version.outputs.version }}
          body: |
            MAE5-focused Codex Desktop Rebuild distribution.

            | Target | Upstream source version |
            |--------|-------------------------|
            | Windows x64 | `${{ steps.version.outputs.win_version || 'N/A' }}` |
            | Linux ARM64 | `${{ steps.version.outputs.linux_source_version || 'N/A' }}` |
          files: |
            artifacts/**/*.zip
            artifacts/**/*.deb
            artifacts/**/*.rpm
            artifacts/**/*.exe
          draft: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
